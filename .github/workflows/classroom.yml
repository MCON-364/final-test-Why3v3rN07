          IA-CRITICAL-UNMODIFIABLE_RESULTS: "${{ steps.ia-critical-unmodifiable.outputs.result }}"
          PRA-CONSTRUCTOR-NULL_RESULTS: "${{ steps.pra-constructor-null.outputs.result }}"
          PRA-CONSTRUCTOR-DEFENSIVE_RESULTS: "${{ steps.pra-constructor-defensive.outputs.result }}"
          PRA-FREQ-EMPTY_RESULTS: "${{ steps.pra-freq-empty.outputs.result }}"
          PRA-FREQ-COUNTS_RESULTS: "${{ steps.pra-freq-counts.outputs.result }}"
          PRA-FREQ-SORTED_RESULTS: "${{ steps.pra-freq-sorted.outputs.result }}"
          PRA-FREQ-TREEMAP_RESULTS: "${{ steps.pra-freq-treemap.outputs.result }}"
          PRA-TOPN-HIGHEST_RESULTS: "${{ steps.pra-topn-highest.outputs.result }}"
          PRA-TOPN-LARGER_RESULTS: "${{ steps.pra-topn-larger.outputs.result }}"
