      # ── Reporter ─────────────────────────────────────────────────────────────
      - name: Autograding Reporter
        if: always()
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          IA-CONSTRUCTOR-NULL_RESULTS: "${{ steps.ia-constructor-null.outputs.result }}"
          IA-CONSTRUCTOR-DEFENSIVE_RESULTS: "${{ steps.ia-constructor-defensive.outputs.result }}"
          IA-CLOSED-ZERO_RESULTS: "${{ steps.ia-closed-zero.outputs.result }}"
          IA-CLOSED-ONLY-RESOLVED_RESULTS: "${{ steps.ia-closed-only-resolved.outputs.result }}"
          IA-CLOSED-ALL_RESULTS: "${{ steps.ia-closed-all.outputs.result }}"
          IA-AVG-ZERO_RESULTS: "${{ steps.ia-avg-zero.outputs.result }}"
          IA-AVG-IGNORES-OPEN_RESULTS: "${{ steps.ia-avg-ignores-open.outputs.result }}"
