name: Autograding Tests

on:
  push:
    branches: [ main, develop, prep ]
  pull_request:
    branches: [ main, develop, prep ]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograde:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile project
        run: mvn -B -ntp test-compile --file pom.xml

      # ══════════════════════════════════════════════════════════════════════
      # IncidentAnalyzerTest  (16 tests × 2 pts = 32 pts)
      # ══════════════════════════════════════════════════════════════════════

      - name: IA - constructorRejectsNullList
        id: ia-constructor-null
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "IA - constructorRejectsNullList"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=IncidentAnalyzerTest#constructorRejectsNullList"
          timeout: 10
          max-score: 2

      - name: IA - constructorMakesDefensiveCopy
        id: ia-constructor-defensive
