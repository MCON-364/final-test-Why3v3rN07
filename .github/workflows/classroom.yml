          PRA-TOPN-EMPTY_RESULTS: "${{ steps.pra-topn-empty.outputs.result }}"
          PRA-STARTS-CORRECT_RESULTS: "${{ steps.pra-starts-correct.outputs.result }}"
          PRA-STARTS-SORTED_RESULTS: "${{ steps.pra-starts-sorted.outputs.result }}"
          PRA-STARTS-EMPTY_RESULTS: "${{ steps.pra-starts-empty.outputs.result }}"
          PRA-STARTS-NO-OTHER_RESULTS: "${{ steps.pra-starts-no-other.outputs.result }}"
